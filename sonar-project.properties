# SonarQube Cloud project identification
sonar.organization=YOUR_SONAR_ORG
sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.projectName=pretix
sonar.projectVersion=1.0

# Source and test layout
sonar.sources=src/pretix
sonar.tests=src/tests
sonar.inclusions=src/**/*.py
sonar.test.inclusions=src/tests/**/*.py

# Python analysis and coverage report path
sonar.python.version=3.11
sonar.python.coverage.reportPaths=src/coverage.xml

# Reduce noise from generated or non-business-code paths
sonar.exclusions=src/pretix/locale/**,src/pretix/**/migrations/**,src/pretix/static/**,src/pretix/**/node_modules/**

sonar.sourceEncoding=UTF-8
