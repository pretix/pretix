{% load i18n %}
{% load static %}
<button type="button" id="run-lottery-btn" class="btn btn-default"
        data-action-url="{{ run_url }}">
    <i class="fa fa-download"></i>
    {% trans "Run lottery" %}
</button>

<button type="button" id="revert-list-btn" class="btn btn-default"
        data-action-url="{{ revert_url }}">
    <i class="fa fa-download"></i>
    {% trans "Revert list" %}
</button>

<div class="modal fade" id="lottery-confirm-modal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="{% trans "Close" %}">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="lottery-modal-title">{% trans "Confirm Lottery Run" %}</h4>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning">
                    <strong>{% trans "Warning!" %}</strong>
                    <p id="lottery-modal-description"></p>
                    <p id="lottery-product-container"><strong id="lottery-product-name"></strong></p>
                    <p id="lottery-modal-warning"></p>
                </div>
                <p>{% trans "Are you sure you want to proceed?" %}</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">{% trans "Cancel" %}</button>
                <button type="button" class="btn btn-warning" id="lottery-confirm-btn">{% trans "Yes, run the lottery" %}</button>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="{% static "pretix_sideburn_lottery/js/waitinglist_lottery.js" %}"></script>
