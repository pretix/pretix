[flake8]
ignore = N802,W503,E402
max-line-length = 160
exclude = migrations,.ropeproject,static,_static,build

[isort]
profile = black
combine_as_imports = true
default_section = THIRDPARTY
include_trailing_comma = true
known_third_party = pretix
known_standard_library = typing
skip = setup.py
use_parentheses = True
force_grid_wrap = 0
line_length = 88
known_first_party = pretix_twilio_sms

[tool:pytest]
DJANGO_SETTINGS_MODULE = pretix.testutils.settings

[coverage:run]
source = pretix_twilio_sms
omit = */migrations/*,*/urls.py,*/tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __str__
    der __repr__
    if settings.DEBUG
    NOQA
    NotImplementedError

[check-manifest]
ignore =
    .update-locales.sh
    .install-hooks.sh
    pretixplugin.toml
    Makefile
    manage.py
    tests/*
	*.po
	.gitkeep
